<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Redirecting to Progress…</title>
  <script>
    // Redirect to unified Progress page (My Classes lens)
    const params = new URLSearchParams(window.location.search);
    const classId = params.get("class_id");
    let url = "/student_progress.html?lens=classes";
    if (classId) url += "&class_id=" + encodeURIComponent(classId);
    window.location.replace(url);
  </script>
</head>
<body>
  <p>Redirecting to <a href="/student_progress.html?lens=classes">Progress</a>…</p>
</body>
</html>
