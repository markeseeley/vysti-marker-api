<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vysti — Choose Your Plan</title>
  <link rel="stylesheet" href="/assets/marker.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/shared/supabase-init.js"></script>
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg);
    }
    .role-card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 48px 40px;
      max-width: 500px;
      width: 100%;
      margin: 0 18px;
    }
    .role-title {
      font-size: 28px;
      font-weight: 700;
      margin: 0 0 8px;
      text-align: center;
    }
    .role-subtitle {
      font-size: 14px;
      color: var(--muted);
      text-align: center;
      margin-bottom: 32px;
    }
    .role-buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 20px;
    }
    .role-btn {
      width: 100%;
      padding: 20px 16px;
      border: 2px solid rgba(0,0,0,.08);
      border-radius: 12px;
      background: #fff;
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .role-btn:hover {
      border-color: var(--maroon);
      background: rgba(169,13,34,.02);
    }
    .role-btn:disabled {
      opacity: .5;
      cursor: not-allowed;
      border-color: rgba(0,0,0,.06);
    }
    .role-btn:disabled:hover {
      background: #fff;
      border-color: rgba(0,0,0,.06);
    }
    .role-btn-name {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
    }
    .role-btn-desc {
      font-size: 13px;
      color: var(--muted);
      font-weight: 400;
      line-height: 1.4;
    }
    .role-btn-tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      color: var(--maroon);
      background: rgba(169,13,34,.08);
      padding: 2px 8px;
      border-radius: 6px;
      margin-top: 4px;
      align-self: flex-start;
    }
    .role-both {
      text-align: center;
      margin-bottom: 24px;
    }
    .role-both-link {
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      border: none;
      background: none;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .role-both-link:hover {
      color: var(--maroon);
    }
    .role-note {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      margin-bottom: 24px;
    }
    .logout-btn {
      width: 100%;
      padding: 10px;
      border: 1px solid rgba(0,0,0,.14);
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 16px;
    }
    .logout-btn:hover {
      background: rgba(0,0,0,.04);
    }
    .role-status {
      text-align: center;
      font-size: 13px;
      color: var(--muted);
      margin-top: 12px;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <div class="role-card">
    <h1 class="role-title">Choose your plan</h1>
    <p class="role-subtitle">What would you like to do with Vysti?</p>

    <div class="role-buttons">
      <button id="markBtn" class="role-btn" type="button">
        <span class="role-btn-name">Mark — $11.99/mo</span>
        <span class="role-btn-desc">Batch-mark student essays with Vysti's marking engine. Track class progress over time.</span>
        <span class="role-btn-tag">For Teachers</span>
      </button>
      <button id="reviseBtn" class="role-btn" type="button">
        <span class="role-btn-name">Revise — $8.99/mo</span>
        <span class="role-btn-desc">Get feedback on your writing and practice revision with guided exercises.</span>
        <span class="role-btn-tag">For Students</span>
      </button>
    </div>

    <div class="role-both">
      <button id="bothBtn" class="role-both-link" type="button">I need both</button>
    </div>

    <p class="role-note">You can add the other plan later from your account settings.</p>

    <button id="logoutBtn" class="logout-btn" type="button">Sign Out</button>
    <div id="statusMsg" class="role-status"></div>
  </div>

  <script>
    const markBtn = document.getElementById("markBtn");
    const reviseBtn = document.getElementById("reviseBtn");
    const bothBtn = document.getElementById("bothBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const statusMsg = document.getElementById("statusMsg");

    // Price IDs (from Stripe product catalog)
    const PRICE_MARK = "price_1T668o05dveHz2frQ0A6yljL";
    const PRICE_REVISE = "price_1T668o05dveHz2frBXPt1CyJ";

    // ===== Auth guard =====
    let sessionToken = null;
    (async () => {
      const { data } = await supa.auth.getSession();
      if (!data.session) {
        window.location.href = "/signin.html";
        return;
      }
      sessionToken = data.session.access_token;

      // Handle return from Stripe checkout
      const params = new URLSearchParams(window.location.search);
      if (params.get("checkout") === "success") {
        statusMsg.textContent = "Payment confirmed! Setting up your account\u2026";
        // Fetch updated profile and route
        try {
          const resp = await fetch("/api/profile", {
            headers: { "Authorization": "Bearer " + sessionToken },
          });
          if (resp.ok) {
            const profile = await resp.json();
            localStorage.setItem("vysti_products", JSON.stringify({
              has_mark: profile.has_mark,
              has_revise: profile.has_revise,
              has_write: profile.has_write || false,
            }));
            if (profile.has_mark) {
              localStorage.setItem("vysti_role", "teacher");
              window.location.assign("/teacher_react.html");
            } else {
              localStorage.setItem("vysti_role", "student");
              window.location.assign("/student_react.html");
            }
            return;
          }
        } catch (err) {
          console.warn("Profile fetch after checkout failed:", err);
        }
        statusMsg.textContent = "Payment received. Please select your plan to continue.";
        // Clear the query string
        history.replaceState(null, "", "/role.html");
      } else if (params.get("checkout") === "cancelled") {
        statusMsg.textContent = "Checkout was cancelled. You can try again.";
        history.replaceState(null, "", "/role.html");
      }
    })();

    // ===== Start Stripe Checkout =====
    async function startCheckout(priceId) {
      if (!sessionToken) return;
      markBtn.disabled = reviseBtn.disabled = true;
      bothBtn.disabled = true;
      statusMsg.textContent = "Redirecting to checkout\u2026";

      try {
        const resp = await fetch("/api/stripe/checkout", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + sessionToken,
          },
          body: JSON.stringify({ price_id: priceId }),
        });

        if (!resp.ok) {
          const err = await resp.json().catch(() => ({}));
          throw new Error(err.detail || "Checkout failed");
        }

        const { checkout_url } = await resp.json();
        window.location.assign(checkout_url);
      } catch (err) {
        console.error("Checkout error:", err);
        statusMsg.textContent = err.message || "Something went wrong. Please try again.";
        markBtn.disabled = reviseBtn.disabled = false;
        bothBtn.disabled = false;
      }
    }

    markBtn.addEventListener("click", () => startCheckout(PRICE_MARK));
    reviseBtn.addEventListener("click", () => startCheckout(PRICE_REVISE));
    // "Both" — for now, start with Mark checkout. They can add Revise later.
    bothBtn.addEventListener("click", () => startCheckout(PRICE_MARK));

    // ===== Logout =====
    logoutBtn.addEventListener("click", async () => {
      await supa.auth.signOut();
      localStorage.removeItem("vysti_role");
      localStorage.removeItem("vysti_products");
      window.location.replace("/signin.html");
    });
  </script>
</body>
</html>
